services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - resume/docker.env
    volumes:
      - "postgresql-data:/var/lib/postgresql/data"
    command: -p 5432

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data

  app:
    container_name: app_resume
    hostname: app_resume
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - resume/docker.env
    volumes:
      - .:/srv/app
      - static-files:/srv/app/staticfiles
      - media-files:/srv/app/media
      - ./logs:/srv/app/logs
    expose:
      - "8000"
    command: gunicorn resume.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile -

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - static-files:/srv/app/staticfiles:ro
      - media-files:/srv/app/media:ro
    ports:
      - "8090:80"
    networks:
      - default
      - nginx_network

networks:
  nginx_network:
    external: true

volumes:
  postgresql-data:
  redis-data:
  static-files:
  media-files:
